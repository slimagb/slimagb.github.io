function log(msg, cls) {
    const el = document.getElementById('log');
    el.innerHTML += `<span class="${cls || ''}">${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
}

async function deploy() {
    const token = document.getElementById('token').value.trim();
    if (!token) { log('Please enter a token', 'error'); return; }
    
    const owner = 'slimagb';
    const repo = 'slimagb.github.io';
    const headers = {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
    };
    
    log('Starting deployment...', 'info');
    
    for (const [path, content] of Object.entries(FILES)) {
        log(`Uploading ${path}...`, 'info');
        try {
            // Check if file exists first
            let sha = null;
            try {
                const check = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, { headers });
                if (check.ok) {
                    const data = await check.json();
                    sha = data.sha;
                }
            } catch(e) {}
            
            const body = {
                message: `Add ${path}`,
                content: content
            };
            if (sha) body.sha = sha;
            
            const resp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                method: 'PUT',
                headers,
                body: JSON.stringify(body)
            });
            
            if (resp.ok) {
                log(`  ✓ ${path} uploaded successfully`, 'success');
            } else {
                const err = await resp.json();
                log(`  ✗ ${path} failed: ${err.message}`, 'error');
            }
        } catch(e) {
            log(`  ✗ ${path} error: ${e.message}`, 'error');
        }
    }
    
    log('\nDeployment complete! Site will be live at https://slimagb.github.io in a few minutes.', 'success');
}
